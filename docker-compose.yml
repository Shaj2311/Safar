services:

  database:
    build:
      context: ./db
    container_name: safar_postgres_db
    ports:
      - "5432:5432"
    env_file:
      - ./db/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
      build:
        context: .
        dockerfile: ./backend/Dockerfile
      container_name: safar_backend
      ports:
        - "8000:8000"
      depends_on:
        - database
      env_file:
        - ./db/.env

volumes:
  postgres_data:
