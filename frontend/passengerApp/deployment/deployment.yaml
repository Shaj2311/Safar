apiVersion: apps/v1
kind: Deployment
metadata:
  name: safar-frontend-deployment
  labels:
    app: safar-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safar-frontend
  template:
    metadata:
      labels:
        app: safar-frontend
    spec:
      containers:
      - name: frontend-container
        image: us-central1-docker.pkg.dev/project-b054c456-52e8-4026-af3/my-repo/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5173
        envFrom:
        - secretRef:
            name: frontend-env
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      restartPolicy: Always
